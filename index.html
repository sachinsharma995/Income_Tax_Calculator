<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Tax Calculator</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

#parent{
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 35px 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    color: white;
}

h1{
    text-align: center;
    margin-bottom: 25px;
    font-size: 32px;
    color: #00ffd5;
}

label{
    font-size: 18px;
    display: block;
    margin-bottom: 10px;
}

input{
    width: 100%;
    padding: 14px;
    border: none;
    outline: none;
    border-radius: 10px;
    font-size: 18px;
    margin-bottom: 20px;
}

input:focus{
    box-shadow: 0 0 10px #00ffd5;
}

button{
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    background: #00ffd5;
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: white;
    transform: translateY(-2px);
}

h2{
    margin-top: 25px;
    text-align: center;
    font-size: 26px;
    color: #ffd700;
}

@media(max-width:500px){
    h1{
        font-size: 26px;
    }

    #parent{
        padding: 25px 20px;
    }
}
</style>
</head>

<body>

<div id="parent">
    <h1>Income Tax Calculator</h1>

    <form>
        <label for="income">Enter Your Income</label>
        <input type="number" id="income" placeholder="₹ Enter yearly income">

        <button type="submit">Calculate Tax</button>
    </form>

    <h2>Total Tax: ₹0</h2>
</div>

<script src="index.js"></script>
</body>
</html>
